<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> My? Game Controller Input</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        #gamepad-info { background: #f0f0f0; padding: 15px; border-radius: 5px; margin: 10px 0; }
        .button-state { margin: 5px 0; }
        .active { color: green; font-weight: bold; }
        .inactive { color: gray; }
    </style>
</head>
<body>
    <h1>Game Controller Input Display</h1>
    <div id="gamepad-info">
        <p id="status">No controller detected</p>
        <div id="buttons"></div>
        <div id="axes"></div>
    </div>

    <script>
        const gamepadInfo = document.getElementById('gamepad-info');
        const statusEl = document.getElementById('status');
        const buttonsEl = document.getElementById('buttons');
        const axesEl = document.getElementById('axes');

        function updateGamepadState() {
            const gamepads = navigator.getGamepads();
            
            if (!gamepads || !gamepads[0]) {
                statusEl.textContent = 'No controller detected. Connect a gamepad...';
                return;
            }

            const gamepad = gamepads[0];
            statusEl.textContent = `Connected: ${gamepad.id}`;

            // Display buttons
            buttonsEl.innerHTML = '<h3>Buttons:</h3>';
            gamepad.buttons.forEach((button, index) => {
                const isPressed = button.pressed;
                const div = document.createElement('div');
                div.className = `button-state ${isPressed ? 'active' : 'inactive'}`;
                div.textContent = `Button ${index}: ${isPressed ? 'PRESSED' : 'Released'} (${button.value.toFixed(0)})`;
                buttonsEl.appendChild(div);
            });

            // Display axes (analog sticks and triggers)
            axesEl.innerHTML = '<h3>Axes (Analog):</h3>';
            gamepad.axes.forEach((axisValue, index) => {
                const div = document.createElement('div');
                div.className = 'button-state';
                div.textContent = `Axis ${index}: ${axisValue.toFixed(3)}`;
                axesEl.appendChild(div);
            });

            requestAnimationFrame(updateGamepadState);
        }

        window.addEventListener('gamepadconnected', (event) => {
            console.log('Gamepad connected:', event.gamepad);
            updateGamepadState();
        });

        window.addEventListener('gamepaddisconnected', (event) => {
            console.log('Gamepad disconnected:', event.gamepad);
            statusEl.textContent = 'Controller disconnected';
            buttonsEl.innerHTML = '';
            axesEl.innerHTML = '';
        });

        // Start polling
        updateGamepadState();
    </script>
</body>
</html>
